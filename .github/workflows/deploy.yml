name: Deploy to VPS (library)

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: deploy-library
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pack checked out source
        run: git archive --format=tar.gz --output=library-source.tgz HEAD

      - name: Upload source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: library-source.tgz
          target: /tmp/library-deploy
          overwrite: true

      - name: Roll out on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail
            install -d /opt/library/app
            cd /opt/library/app
            echo "[deploy] node=$(node -v) npm=$(npm -v)"
            echo "[deploy] unpack checked out source from GitHub Actions"
            find . -mindepth 1 -maxdepth 1 ! -name .git ! -name '.env*' ! -name node_modules -exec rm -rf {} +
            tar -xzf /tmp/library-deploy/library-source.tgz -C /opt/library/app
            printf '%s\n' '${{ github.sha }}' > .deploy-sha
            LIBRARY_ROLLOUT_SKIP_GIT_PULL=1 bash deploy/library-rollout.sh
